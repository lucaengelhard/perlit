name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.2.3)"
        required: true
        default: "0.0.1"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      namespace: preview
      package: perlit
      tag: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Clone typst packages
        uses: actions/checkout@v4
        with:
          path: packages
          repository: lucaengelhard/packages
          sparse-checkout: packages/preview/${{ env.package }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Create release branch
        run: |
          cd packages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "release/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}"

          TARGET_DIR="packages/packages/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}"
          git sparse-checkout add "$VERSION_PATH"

      - name: Copy source
        run: |
          TARGET_DIR="packages/packages/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}"

          mkdir -p "$TARGET_DIR"
          cp -ra source/* "$TARGET_DIR/"
          rm -rf "$TARGET_DIR/.git"

      - name: Debug File Structure
        run: |
          echo "Checking if files exist in the target directory:"
          ls -R packages/packages/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}

      - name: Commit and push Changes
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          cd packages

          git sparse-checkout reapply

          git add --sparse "packages/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}"
          git commit -m "update ${{ env.package }} to ${{ env.tag }}" || echo "No changes to commit"
          git push origin "release/${{ env.namespace }}/${{ env.package }}/${{ env.tag }}" --force