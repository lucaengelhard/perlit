name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.2.3)"
        required: true
        default: "0.0.2"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      tag: ${{ github.event.release.tag_name || inputs.tag }}
      path: packages/packages/preview/perlit/${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update typst.toml
        run: sed -i "s/^version = \".*\"/version = \"${{ env.tag }}\"/" typst.toml
      - name: Update README.md
        run: sed -i "s/@preview\/perlit:[0-9]\+\.[0-9]\+\.[0-9]\+/@preview\/perlit:${{ env.tag }}/g" README.md
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
          generate_release_notes: true
          files: |
            README.md
            LICENSE
            lib.typ
            typst.toml
            gallery/*
            src/*
      - name: Update Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com" 

          git add .
          git commit -m "Update semver" || echo "No changes to commit"

          git push


