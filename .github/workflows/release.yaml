name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.2.3)"
        required: true
        default: "0.0.1"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: repo
      - name: checkout package repo
        run: |
          git clone --depth 1 --no-checkout --filter="tree:0" https://github.com/${{ github.repository_owner }}/packages.git
          cd packages
          git sparse-checkout init
          git sparse-checkout set packages/preview/perlit
          git remote add upstream git@github.com:typst/packages
          git config remote.upstream.partialclonefilter tree:0
          git checkout main
      - name: copy files into packages repo
        run: |
          mkdir -p packages/packages/preview/perlit/${{ github.events.release.tag_name }}
          cp -a repo/* packages/packages/preview/perlit/${{ github.events.release.tag_name }}/
          ls  packages/packages/preview/perlit/${{ github.events.release.tag_name }}